name: Build and push Binder image

on:
  push:
    branches: [main]
    paths:
      - "binder/**"
      - "!binder/Dockerfile"
      - "!fly/Dockerfile"
      - "requirements.txt"
      - "pyproject.toml"
      - ".github/workflows/binder.yml"
      - "notebooks/*.ipynb"
      - fly/**
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  binder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push Binder image to GHCR
        uses: jupyterhub/repo2docker-action@master
        with:
          # Image name must match exactly what mybinder.org would compute
          # from your repo — this naming convention is what enables the cache hit.
          IMAGE_NAME: ${{ github.repository_owner }}/ppm-framework
          DOCKER_REGISTRY: ghcr.io
          DOCKER_USERNAME: ${{ github.actor }}
          DOCKER_PASSWORD: ${{ secrets.GHCR_TOKEN }}
          BINDER_CACHE: "true"
          ADDITIONAL_TAG: latest

      - name: Sync fly/Dockerfile to new image tag
        run: |
          TAG=$(grep "^FROM" binder/Dockerfile | awk -F: '{print $2}')
          sed -i "s|FROM ghcr.io/${{ github.repository_owner }}/ppm-framework:.*|FROM ghcr.io/${{ github.repository_owner }}/ppm-framework:${TAG}|" fly/Dockerfile
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fly/Dockerfile
          git diff --staged --quiet || git commit -m "chore: sync fly/Dockerfile to image tag ${TAG}"
          git push
